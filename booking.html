<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海之星 - 線上訂位</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #7dd3fc 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.25rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 480px; 
            padding: 2.25rem 1.75rem;
        }

        .input-field {
            width: 100%;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 1rem;
            padding: 0.875rem 1.25rem;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .input-field:focus {
            outline: none;
            border-color: #3b82f6;
            background: white;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .btn-submit {
            width: 100%;
            background: #3b82f6;
            color: white;
            padding: 1.125rem;
            border-radius: 1.25rem;
            font-weight: 700;
            font-size: 1.125rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        .label {
            display: block;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 0.5rem;
            margin-left: 0.5rem;
        }

        /* Modal Styles */
        #custom-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 50;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-slate-800">海之星訂位系統</h1>
            <p class="text-slate-500 mt-2">請填寫下方資訊完成預約</p>
        </div>

        <div class="space-y-5">
            <div>
                <label class="label">訂位姓名</label>
                <input type="text" id="name" class="input-field" placeholder="如何稱呼您？">
            </div>

            <div>
                <label class="label">聯繫電話</label>
                <input type="tel" id="phone" class="input-field" placeholder="請輸入手機號碼">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="label">預約日期</label>
                    <input type="date" id="date" class="input-field">
                </div>
                <div>
                    <label class="label">預約時間</label>
                    <input type="time" id="time" class="input-field">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="label">大人人數</label>
                    <input type="number" id="people" class="input-field" placeholder="人數">
                </div>
                <div>
                    <label class="label">預訂桌數</label>
                    <select id="tables" class="input-field">
                        <option value="1">1 桌</option>
                        <option value="2">2 桌</option>
                        <option value="3">3 桌以上</option>
                        <option value="特訂">特訂</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="label">預約類型</label>
                    <select id="type" class="input-field" onchange="toggleTableValue()">
                        <option value="單點">單點熱炒</option>
                        <option value="桌菜">合菜桌菜</option>
                    </select>
                </div>
                <div id="tableValueWrapper" style="display:none;">
                    <label class="label">桌菜價位</label>
                    <select id="tableValue" class="input-field">
                        <option value="5000">5,000 / 桌</option>
                        <option value="6000">6,000 / 桌</option>
                        <option value="8000">8,000 / 桌</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="label">特殊備註 (選填)</label>
                <textarea id="note" class="input-field" rows="3" placeholder="例如：有小孩需要兒童椅、過敏原等..."></textarea>
            </div>

            <button onclick="submitForm()" class="btn-submit mt-4">確認並送出訂位</button>
        </div>
    </div>

    <!-- 成功彈窗 -->
    <div id="custom-modal">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl">
            <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <h3 class="text-2xl font-bold text-slate-800 mb-2">預訂資料已送出</h3>
            <p class="text-slate-600 mb-8">我們已收到您的訂位申請，闆娘將盡快與您聯繫確認。</p>
            <button onclick="liff.closeWindow()" class="w-full bg-slate-800 text-white py-4 rounded-2xl font-bold">好的，知道了</button>
        </div>
    </div>

    <script>
        const MY_LIFF_ID = "你的LIFF_ID"; // 請填入你的 LIFF ID
        const GAS_URL = "你的GAS部署網址"; // 請填入你的 GAS 網址

        async function initLIFF() {
            try {
                await liff.init({ liffId: MY_LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                }
            } catch (err) {
                console.error("LIFF 載入失敗", err);
            }
        }

        function toggleTableValue() {
            const type = document.getElementById("type").value;
            const wrapper = document.getElementById("tableValueWrapper");
            wrapper.style.display = (type === "桌菜") ? "block" : "none";
        }

        async function submitForm() {
            const name = document.getElementById("name").value.trim();
            const phone = document.getElementById("phone").value.trim();
            const date = document.getElementById("date").value;
            const time = document.getElementById("time").value;
            const people = document.getElementById("people").value.trim();
            const tables = document.getElementById("tables").value;
            const type = document.getElementById("type").value;
            const tableValue = document.getElementById("tableValue").value;
            const note = document.getElementById("note").value.trim() || "無";

            if (!name || !phone || !date || !people || !tables) {
                showToast("請完整填寫資訊");
                return;
            }

            const btn = document.querySelector('.btn-submit');
            btn.disabled = true;
            btn.innerText = "處理中...";

            try {
                let lineId = "unknown";
                try {
                    if (liff.isLoggedIn()) {
                        const profile = await liff.getProfile();
                        lineId = profile.userId;
                    }
                } catch (e) {
                    console.log("無法取得 LINE ID");
                }

                const data = {
                    name: name,
                    phone: phone,
                    date: date,
                    time: time,
                    people: people,
                    tables: tables,
                    type: type,
                    tableValue: (type === "桌菜") ? tableValue : "單點熱炒",
                    note: note,
                    lineId: lineId,
                    action: "add"
                };

                // 修正後的 Fetch 寫法，強化 Redirect 處理
                const response = await fetch(GAS_URL, {
                    method: "POST",
                    mode: "cors", // 明確設定 CORS
                    redirect: "follow", // 追蹤跳轉
                    body: JSON.stringify(data),
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8', 
                    },
                });

                if (!response.ok) throw new Error("網路請求失敗");

                const result = await response.json();

                if (result.result === "success") {
                    let typeDisplay = (type === "桌菜") ? `桌菜 (${tableValue})` : type;
                    let tableDisplay = (tables === "特訂") ? "特訂" : `${tables} 桌`;
                    
                    const message = `🌟 海之星訂位確認 🌟\n\n・姓名：${name}\n・電話：${phone}\n・日期：${date}\n・時間：${time}\n・人數：${people} 人\n・桌數：${tableDisplay}\n\n🙋‍♀️ 訂單編號：${result.id}\n請靜候闆娘確認！`;

                    // 檢查環境，避免在普通瀏覽器報錯
                    if (liff.isInClient()) {
                        await liff.sendMessages([{ type: "text", text: message }]).catch(e => console.log("訊息傳送失敗"));
                    }
                    
                    document.getElementById('custom-modal').style.display = 'flex';
                } else {
                    throw new Error(result.message || "寫入失敗");
                }

            } catch (err) {
                console.error('Submission Error:', err);
                showToast("連線失敗，請檢查網路或稍後再試");
            } finally {
                btn.disabled = false;
                btn.innerText = "確認並送出訂位";
            }
        }

        function showToast(msg) {
            const btn = document.querySelector('.btn-submit');
            const originalText = "確認並送出訂位";
            btn.innerText = msg;
            btn.style.background = "#ef4444"; 
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = "#3b82f6";
            }, 3000);
        }

        window.onload = initLIFF;
    </script>
</body>
</html>
