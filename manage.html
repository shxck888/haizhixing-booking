<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海之星餐廳 - 訂位管理</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #7dd3fc 100%);
            min-height: 100vh;
            padding: 1.25rem;
            padding-bottom: 8rem; /* 預留空間給除錯面板 */
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
        }

        .order-card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(12px);
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            padding: 1.5rem;
            margin-bottom: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 700;
        }

        .status-待確認 { background: #fef3c7; color: #92400e; }
        .status-已確認 { background: #dcfce7; color: #166534; }
        .status-已取消 { background: #fee2e2; color: #991b1b; }
        .status-已完成 { background: #e0f2fe; color: #0369a1; }

        .info-row { display: flex; justify-content: space-between; margin-bottom: 0.5rem; color: #475569; }
        .info-label { font-weight: 500; color: #94a3b8; }

        .btn-action { flex: 1; padding: 0.75rem; border-radius: 0.75rem; font-weight: 700; font-size: 0.9rem; text-align: center; }
        .btn-edit { background: #f1f5f9; color: #475569; }
        .btn-cancel { background: #fff1f2; color: #e11d48; }

        #loading-screen {
            position: fixed; inset: 0; background: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }

        .spinner {
            border: 4px solid #f3f3f3; border-top: 4px solid #0ea5e9;
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite;
        }

        /* 除錯面板 */
        #debug-panel {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(15, 23, 42, 0.95); color: #22d3ee;
            font-family: monospace; font-size: 11px; padding: 12px;
            z-index: 999; height: 120px; overflow-y: auto;
            border-top: 2px solid #0ea5e9;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p class="mt-4 text-slate-500 font-bold">正在讀取記錄...</p>
    </div>

    <div class="container">
        <div class="header text-center mb-6">
            <h2 class="text-2xl font-extrabold text-sky-900 tracking-tight">我的訂位管理</h2>
            <p class="text-slate-500 font-bold text-sm mt-1">海之星餐廳</p>
        </div>

        <div id="order-list"></div>

        <div id="no-data" class="hidden text-center py-12">
            <div class="text-6xl mb-4">🍽️</div>
            <p class="text-slate-500 font-bold text-lg">目前尚無訂位紀錄</p>
            <p class="text-slate-400 text-sm mt-2">請確認您是否使用相同的 LINE 帳號預訂</p>
            <button onclick="fetchOrders()" class="mt-6 px-4 py-2 bg-sky-100 text-sky-700 rounded-full text-sm font-bold">手動刷新</button>
        </div>
    </div>

    <!-- 除錯面板 -->
    <div id="debug-panel"></div>

    <script>
        // ！！請確認這裡的網址是您剛剛「部署新版本」後的最新網址！！
        const GAS_URL = "https://script.google.com/macros/s/AKfycby5o68wMxbXbeBjMpq5rdeVHqvvvOyIPh5uNhpXEue6rpaMWHMa0cL_TaoqEoMSBnOG/exec";
        const LIFF_ID = "2009355251-gFwmzHaQ"; 
        
        let currentUserId = "";

        // 顯示除錯訊息的函數
        function logDebug(msg) {
            const panel = document.getElementById('debug-panel');
            const time = new Date().toLocaleTimeString('zh-TW', { hour12: false });
            panel.innerHTML += `<div class="mb-1">[${time}] ${msg}</div>`;
            panel.scrollTop = panel.scrollHeight; // 自動捲動到最底
            console.log(msg);
        }

        async function init() {
            try {
                logDebug("開始初始化 LIFF...");
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    logDebug("尚未登入，準備跳轉登入畫面...");
                    liff.login();
                    return;
                }
                const profile = await liff.getProfile();
                currentUserId = profile.userId;
                logDebug("✅ 成功獲取 UserID: " + currentUserId);
                fetchOrders();
            } catch (err) {
                logDebug("❌ LIFF 錯誤: " + err.message);
                document.getElementById('loading-screen').innerHTML = `<p class='p-4 text-red-500 text-center font-bold'>系統異常<br>${err.message}</p>`;
            }
        }

        async function fetchOrders() {
            document.getElementById('loading-screen').style.display = 'flex';
            logDebug("開始呼叫 GAS API 取得資料...");
            try {
                // 加上時間戳 (t=...) 避免手機瀏覽器快取舊資料
                const url = `${GAS_URL}?action=query&lineId=${currentUserId}&t=${new Date().getTime()}`;
                const response = await fetch(url);
                
                if (!response.ok) throw new Error('伺服器連線失敗');
                
                const result = await response.json();
                
                if (result.status === 'success') {
                    const debugInfo = result.debug ? JSON.stringify(result.debug) : "無除錯資訊";
                    logDebug(`✅ GAS 回傳成功: ${debugInfo}`);
                    
                    document.getElementById('loading-screen').style.display = 'none';

                    if (result.data && result.data.length > 0) {
                        logDebug(`👉 準備渲染 ${result.data.length} 筆資料`);
                        renderOrders(result.data);
                        document.getElementById('no-data').classList.add('hidden');
                    } else {
                        logDebug(`⚠️ 查詢結果為 0 筆`);
                        document.getElementById('order-list').innerHTML = '';
                        document.getElementById('no-data').classList.remove('hidden');
                    }
                } else {
                    logDebug(`❌ GAS 回傳錯誤: ${result.message}`);
                    document.getElementById('loading-screen').style.display = 'none';
                }

            } catch (err) {
                logDebug("❌ Fetch 錯誤: " + err.message);
                document.getElementById('loading-screen').style.display = 'none';
            }
        }

        function renderOrders(orders) {
            const listDiv = document.getElementById('order-list');
            listDiv.innerHTML = '';

            orders.forEach(order => {
                const card = document.createElement('div');
                card.className = 'order-card';
                
                const displayStatus = order.status || "待確認";
                const isFinalState = ['已取消', '已拒絕', '已完成'].includes(displayStatus);

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span class="text-xs font-bold text-slate-400 block mb-1">訂單編號</span>
                            <span class="text-sm font-black text-slate-800 break-all">${order.id}</span>
                        </div>
                        <span class="status-badge status-${displayStatus}">${displayStatus}</span>
                    </div>
                    
                    <div class="space-y-2 mb-6 text-sm">
                        <div class="info-row">
                            <span class="info-label">姓名 / 電話</span>
                            <span class="font-bold text-slate-700">${order.name} / ${order.phone}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">預定時間</span>
                            <span class="font-bold text-slate-700">${order.date} ${order.time}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">人數 / 桌數</span>
                            <span class="font-bold text-slate-700">${order.people}人 (${order.tables})</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">類型 / 價位</span>
                            <span class="font-bold text-slate-700">${order.type} / ${order.price}</span>
                        </div>
                        <div class="pt-2 border-t border-slate-100">
                            <span class="info-label text-xs">備註說明</span>
                            <p class="text-slate-600 mt-1">${order.note || '無'}</p>
                        </div>
                    </div>

                    ${!isFinalState ? `
                    <div class="flex gap-3">
                        <button onclick="handleEdit('${order.id}', '${order.note}')" class="btn-action btn-edit">修改備註</button>
                        <button onclick="handleCancel('${order.id}')" class="btn-action btn-cancel">取消訂位</button>
                    </div>
                    ` : `
                    <p class="text-center text-xs text-slate-400 font-medium italic">此訂位已結案 (${displayStatus})</p>
                    `}
                `;
                listDiv.appendChild(card);
            });
        }

        async function handleEdit(orderId, oldNote) {
            const newNote = prompt("請輸入新的備註內容：", oldNote);
            if (newNote !== null && newNote !== oldNote) {
                await updateOrder({ action: 'updateNote', orderId: orderId, note: newNote });
            }
        }

        async function handleCancel(orderId) {
            if (confirm("確定要取消這筆訂位嗎？")) {
                await updateOrder({ action: 'cancelOrder', orderId: orderId });
            }
        }

        async function updateOrder(payload) {
            document.getElementById('loading-screen').style.display = 'flex';
            logDebug(`準備發送更新請求: ${payload.action}`);
            try {
                const url = `${GAS_URL}?action=${payload.action}&orderId=${payload.orderId}&note=${encodeURIComponent(payload.note || '')}`;
                await fetch(url, { method: "POST", mode: "no-cors" });
                
                logDebug(`請求已送出，等待重新讀取...`);
                setTimeout(() => { fetchOrders(); }, 1500);
            } catch (err) {
                logDebug(`❌ 更新錯誤: ${err.message}`);
                fetchOrders();
            }
        }

        window.onload = init;
    </script>
</body>
</html>
